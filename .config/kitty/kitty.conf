font_size 12.0

pixel_scroll yes
cursor_trail 3
cursor_trail_decay 0.1 0.4

scrollback_lines 10000

underline_hyperlinks hover

# copy_on_select yes

visual_bell_duration 0.0

# Window padding
window_padding_width 4


# No tittle bar
hide_window_decorations yes


tab_bar_style fade
tab_bar_align center

allow_remote_control socket-only
listen_on unix:/tmp/mykitty


# kitty_mod alt+shift

# [Navigate the Kitty Scrollback with Neovim - YouTube](https://www.youtube.com/watch?v=2IU5qd-ahgw)
map alt+: launch --stdin-source=@screen_scrollback --type=overlay /usr/bin/env bash -c "SCROLL_MODE=2 nvim +$ +'nmap q ZQ' +'xmap q ZQ' +'nnoremap yy yyq' +'xmap y yq' +'set laststatus=0 nonu nornu signcolumn=no cursorline cmdheight=0'"

# map alt+shift+g launch --type=overlay --cwd=current lazygit 

tab_bar_filter session:~ or session:^$ 
allow_remote_control yes 
# Unfortunatly still needed since we use remote control to start the session 
map alt+ctrl+w save_as_session --relocatable --use-foreground-process --match=session:. .
map alt+ctrl+o launch  --type=tab ~/.config/kitty/kitty-sessionizer.sh
# Save the status of the current session to its file
map alt+ctrl+a goto_session -1
# Go to the previously opened session
map alt+ctrl+u  launch  --type=tab ~/.config/kitty/session-switch.sh
# See a overview of open sessions and choose one
map alt+ctrl+q close_session 
# See a overview of open sessions and close one
map kitty_mod+t launch --type=tab --cwd=current 
map kitty_mod+enter launch --type=window --cwd=current 
map kitty_mod+n launch --type=os-window --cwd=current 

map ctrl+shift+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard
map --when-focus-on var:in_editor ctrl+shift+c

map alt+shift+1 goto_tab 1
map alt+shift+2 goto_tab 2
map alt+shift+3 goto_tab 3
map alt+shift+4 goto_tab 4
map alt+shift+5 goto_tab 5
map alt+shift+6 goto_tab 6
map alt+shift+7 goto_tab 7
map alt+shift+8 goto_tab 8
map alt+shift+9 goto_tab 9
map alt+shift+0 goto_tab 10

# Bad mapping
map kitty_mod+left  no_op
map kitty_mod+right no_op


include current-theme.conf

# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMonoNL Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
