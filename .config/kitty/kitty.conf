# vim: foldmethod=marker 

# {{{ Other
font_size 12.0

pixel_scroll yes
cursor_trail 3
cursor_trail_decay 0.1 0.4

scrollback_lines 10000

underline_hyperlinks hover

# copy_on_select yes

visual_bell_duration 0.0
dynamic_background_opacity yes

# Window padding
window_padding_width 4

# No tittle bar
hide_window_decorations yes

tab_bar_style fade
tab_bar_align center

allow_remote_control socket-only
listen_on unix:/tmp/mykitty
# }}}

# WARN: 
# clear_all_shortcuts yes

# Kitty Config
map ctrl+s>shift+r load_config_file
# {{{ Ui

# Font Size
map kitty_mod+equal  change_font_size all +1.0
map kitty_mod+minus  change_font_size all -1.0
map kitty_mod+backspace  change_font_size all 0

# Transparency

# }}}


# [Navigate the Kitty Scrollback with Neovim - YouTube](https://www.youtube.com/watch?v=2IU5qd-ahgw)
map alt+: launch --stdin-source=@screen_scrollback --type=overlay /usr/bin/env bash -c "SCROLL_MODE=2 nvim --startuptime ~/vim.log"

# {{{ Sessions
tab_bar_filter session:~ or session:^$ 
allow_remote_control yes 
# Unfortunatly still needed since we use remote control to start the session 
map alt+ctrl+w save_as_session --relocatable --use-foreground-process --match=session:. .
map alt+ctrl+o launch  --type=tab ~/.config/kitty/kitty-sessionizer.sh
# Save the status of the current session to its file
map alt+ctrl+a goto_session -1
# Go to the previously opened session
map alt+ctrl+u  launch  --type=tab ~/.config/kitty/session-switch.sh
# See a overview of open sessions and choose one
map alt+ctrl+q close_session 

# }}}

# {{{ Clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard
map --when-focus-on var:in_editor ctrl+shift+c
map --when-focus-on var:in_editor ctrl+shift+v
map --when-focus-on var:in_editor ctrl+shift+x

map shift+insert paste_from_clipboard
map ctrl+insert copy_to_clipboard
map --when-focus-on var:in_editor shift+insert
map --when-focus-on var:in_editor ctrl+insert 

# }}}

# {{{ Windows

# TODO: oi
map ctrl+shift+n launch --type=os-window --cwd=current 

# See a overview of open sessions and close one
map ctrl+shift+enter launch --type=window --cwd=current 

map ctrl+shift+w close_window

map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

map ctrl+shift+f move_window_forward
map ctrl+shift+b move_window_backward

map ctrl+s>1 first_window
map ctrl+s>2 second_window
map ctrl+s>3 third_window
map ctrl+s>4 fourth_window
map ctrl+s>5 fifth_window
map ctrl+s>6 sixth_window
map ctrl+s>7 seventh_window
map ctrl+s>8 eighth_window
map ctrl+s>9 ninth_window
map ctrl+s>0 tenth_window

# {{{ TODO: Create a new "manage windows" mode (win_mode)
# Add new actions 
map --new-mode win_mode ctrl+s>w
# map --new-mode win_mode ctrl+shift+r

# Switch focus to the neighboring window in the indicated direction using arrow keys
map --mode win_mode i neighboring_window up
map --mode win_mode j neighboring_window left
map --mode win_mode l neighboring_window right
map --mode win_mode k neighboring_window down

# Move the active window in the indicated direction
map --mode win_mode shift+i move_window up
map --mode win_mode shift+j move_window left
map --mode win_mode shift+l move_window right
map --mode win_mode shift+k move_window down

# Resize the active window
map --mode win_mode n resize_window narrower
map --mode win_mode w resize_window wider
map --mode win_mode t resize_window taller
map --mode win_mode s resize_window shorter

# Exit the manage window mode
map --mode win_mode esc pop_keyboard_mode
map --mode win_mode ctrl+c pop_keyboard_mode
map --mode win_mode ctrl+g pop_keyboard_mode
# }}}

# }}}

# {{{ Tab 
map ctrl+shift+t launch --type=tab --cwd=current 

map ctrl+shift+q close_tab

map ctrl+shift+, previous_tab
map ctrl+shift+. next_tab

map ctrl+shift+0 move_tab_forward
map ctrl+shift+9 move_tab_backward

map alt+m>1 goto_tab 1
map alt+m>2 goto_tab 2
map alt+m>3 goto_tab 3
map alt+m>4 goto_tab 4
map alt+m>5 goto_tab 5
map alt+m>6 goto_tab 6
map alt+m>7 goto_tab 7
map alt+m>8 goto_tab 8
map alt+m>9 goto_tab 9
map alt+m>0 goto_tab 10
# }}}

include current-theme.conf

# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMonoNL Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
